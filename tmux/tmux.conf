set -g default-terminal "xterm-256color"
set -g status-bg "#1b1b2a"
set -g status-fg white

set -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M
bind -n C-WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -M
bind -T copy-mode-vi    C-WheelUpPane   send-keys -X halfpage-up
bind -T copy-mode-vi    C-WheelDownPane send-keys -X halfpage-down
bind -T copy-mode-emacs C-WheelUpPane   send-keys -X halfpage-up
bind -T copy-mode-emacs C-WheelDownPane send-keys -X halfpage-down

# To copy, left click and drag to highlight text in yellow,
# once you release left click yellow text will disappear and will automatically be available in clibboard

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Update default binding of `Enter` to also use copy-pipe
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Open a large popup with Prefix-P
bind-key P display-popup -w 88% -h 88% -E -d "#{pane_current_path}"
# bind-key o display-popup -w 50% -h 30% -E "sh -c 'tmux select-window -t \"\$(tmux list-windows | fzf | cut -d: -f1)\"'"
bind-key o display-popup -w 50% -h 50% -E "bash -lc '
branch_of() {
  dir=\$1
  while :; do
    if [ -d \"\$dir/.git\" ]; then
      head_file=\"\$dir/.git/HEAD\"
    elif [ -f \"\$dir/.git\" ]; then
      IFS= read -r line < \"\$dir/.git\" || return
      case \"\$line\" in
        \"gitdir: \"*)
          head_file=\${line#gitdir: }
          case \"\$head_file\" in
            /*) ;;
            *) head_file=\"\$dir/\$head_file\" ;;
          esac
          head_file=\"\$head_file/HEAD\"
          ;;
        *) return ;;
      esac
    else
      [ \"\$dir\" = \"/\" ] && return
      dir=\${dir%/*}
      [ -z \"\$dir\" ] && dir=/
      continue
    fi

    [ -r \"\$head_file\" ] || return
    IFS= read -r line < \"\$head_file\" || return
    case \"\$line\" in
      \"ref: refs/heads/\"*) printf \"%s\" \"\${line#ref: refs/heads/}\" ;;
    esac
    return
  done
}

cyan=\"\$(printf \"\033[36m\")\"
green=\"\$(printf \"\033[32m\")\"
gray=\"\$(printf \"\033[90m\")\"
reset=\"\$(printf \"\033[0m\")\"

target=\$(
  tmux list-panes -a -F \"#{?pane_active,#{window_index}	#{window_name}	#{pane_current_path},}\" |
  sed \"/^$/d\" |
  while IFS=\$(printf \"\t\") read -r idx name path; do
    branch=\$(branch_of \"\$path\")

    if [ -n \"\$branch\" ]; then
      printf \"%s%s%s: %s%s%s %s(%s)%s %s- %s%s\n\" \
        \"\$cyan\" \"\$idx\" \"\$reset\" \
        \"\$cyan\" \"\$name\" \"\$reset\" \
        \"\$green\" \"\$branch\" \"\$reset\" \
        \"\$gray\" \"\$path\" \"\$reset\"
    else
      printf \"%s%s%s: %s%s%s %s- %s%s\n\" \
        \"\$cyan\" \"\$idx\" \"\$reset\" \
        \"\$cyan\" \"\$name\" \"\$reset\" \
        \"\$gray\" \"\$path\" \"\$reset\"
    fi
  done |
  fzf --ansi |
  cut -d: -f1
)

[ -n \"\$target\" ] && tmux select-window -t \"\$target\"
'"

bind-key L display-popup -E "bash -lc '
fmt=\"#\"\"{pane_id} #\"\"{history_size}\"
tmux list-panes -a -F \"\$fmt\" |
awk \"\\\$2 > 5000\" |
while read -r id n; do
  tmux clear-history -t \"\$id\"
  echo \"cleared \$id (\$n lines)\"
done
read -n1 -s -r -p \"Press any key to close...\"
'"

set -sg escape-time 10

unbind-key C-b
set-option -g prefix C-x
bind-key C-x send-prefix
set -g history-limit 1000000
set -g set-titles on
setw -g mouse on

#https://github.com/LunarVim/LunarVim/i ssues/1857#issuecomment-1095203471 set -sg escape-time 10
bind ";" split-window -v -c "#{pane_current_path}"
bind "'" split-window -h -c "#{pane_current_path}"
bind "c" new-window -c "#{pane_current_path}" -t :

# pane navigation
bind -r h select-pane -L # move left
bind -r j select-pane -D # move down
bind -r k select-pane -U # move up
bind -r l select-pane -R # move right

# save tmux sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'
# save neovim sessions
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes '~nvim->nvim'
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'jimeh/tmux-themepack'
set -g @themepack 'powerline/block/cyan'

# put this line at the end
run '~/.config/tmux/plugins/tpm/tpm'

